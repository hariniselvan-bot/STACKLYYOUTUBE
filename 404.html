<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* BACKGROUND GLOW */
.bg-glow{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 40%, rgba(255,0,140,0.2), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(0,212,255,0.2), transparent 40%);
animation: moveBg 10s infinite alternate;
}

@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(40px,20px);}
}

/* PARTICLES */
.particles span{
position:absolute;
width:6px;
height:6px;
background:#ff008c;
border-radius:50%;
animation: float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* CONTAINER */
.container{
position:relative;
text-align:center;
z-index:2;
}

/* GLITCH TEXT */
.glitch{
font-size:120px;
font-weight:800;
position:relative;
color:#fff;
animation: flicker 2s infinite;
}

.glitch::before,
.glitch::after{
content:"404";
position:absolute;
left:0;
}

.glitch::before{
color:#ff008c;
transform:translate(-3px,0);
animation: glitch1 0.5s infinite;
}

.glitch::after{
color:#00d4ff;
transform:translate(3px,0);
animation: glitch2 0.5s infinite;
}

@keyframes glitch1{
0%{clip-path:inset(0 0 80% 0);}
50%{clip-path:inset(20% 0 30% 0);}
100%{clip-path:inset(80% 0 0 0);}
}

@keyframes glitch2{
0%{clip-path:inset(80% 0 0 0);}
50%{clip-path:inset(10% 0 60% 0);}
100%{clip-path:inset(0 0 80% 0);}
}

@keyframes flicker{
0%,100%{opacity:1;}
50%{opacity:0.85;}
}

/* TEXT */
h2{
margin:20px 0;
font-size:28px;
}

p{
color:#aaa;
margin-bottom:30px;
}

/* BUTTON */
.btn{
padding:14px 30px;
border-radius:30px;
background:linear-gradient(45deg,#ff008c,#00d4ff);
border:none;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff008c;
}

/* RESPONSIVE */
@media(max-width:768px){
.glitch{
font-size:70px;
}
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="particles">
  <span style="left:10%; animation-delay:0s;"></span>
  <span style="left:20%; animation-delay:2s;"></span>
  <span style="left:30%; animation-delay:1s;"></span>
  <span style="left:50%; animation-delay:3s;"></span>
  <span style="left:70%; animation-delay:2s;"></span>
  <span style="left:90%; animation-delay:1s;"></span>
</div>

<div class="container">
  <div class="glitch">404</div>

  <h2>Oops! Page Not Found 🎬</h2>

  <p>This page doesn’t exist or may have been removed.</p>

  <button class="btn" onclick="goBack()">Go Back</button>
</div>

<script>
// SMART BACK BUTTON
function goBack(){
  if(window.history.length > 1){
    window.history.back();   // goes to previous page
  } else {
    window.location.href = "index.html"; // fallback
  }
}

// ESC KEY SUPPORT
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape"){
    goBack();
  }
});
</script>

</body>
</html>
