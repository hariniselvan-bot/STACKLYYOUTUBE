<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Header</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
background:#0d0d0d;
}

/* HEADER */

header{
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 80px;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:1000;
}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:34px;
font-weight:600;
color:white;
}

.logo-icon{
width:36px;
height:36px;
border-radius:10px;
background:linear-gradient(45deg,#7c3aed,#ff3e7f);
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* NAV */

nav ul{
display:flex;
list-style:none;
gap:40px;
align-items:center;
}

nav ul li{
position:relative;
}

nav ul li a{
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
color:#e4e4e4;
font-size:16px;
font-weight:500;
cursor:pointer;
}

/* DROPDOWN */

.dropdown{
position:absolute;
top:100%;
left:0;
background:#111;
padding:18px;
border-radius:10px;
display:none;
flex-direction:column;
gap:12px;
min-width:160px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* DESKTOP HOVER */

@media(min-width:901px){

nav ul li:hover > .dropdown{
display:flex;
}

}

/* MOBILE DROPDOWN */

.dropdown.active{
display:flex;
}

/* RIGHT SIDE */

.right{
display:flex;
align-items:center;
gap:30px;
}

.search{
color:white;
font-size:18px;
cursor:pointer;
}

.contact{
background:linear-gradient(90deg,#7c3aed,#ff3e7f);
padding:12px 26px;
border-radius:35px;
color:white;
font-size:15px;
font-weight:600;
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
}

.hamburger{
display:none;
font-size:24px;
color:white;
cursor:pointer;
}

/* MOBILE FULL SCREEN MENU */

.mobile-menu{
position:fixed;
top:0;
left:-100%;
width:100%;
height:100vh;
background:linear-gradient(160deg,#0b0b0b,#1a0033,#2a001d);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:.4s;
z-index:2000;
}

.mobile-menu.active{
left:0;
}

.mobile-menu ul{
list-style:none;
text-align:center;
}

.mobile-menu li{
margin:20px 0;
}

.mobile-menu a{
color:white;
font-size:26px;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
justify-content:center;
}

.mobile-dropdown{
display:none;
margin-top:10px;
}

.mobile-dropdown a{
display:block;
font-size:18px;
color:#ddd;
margin:8px 0;
}

.mobile-dropdown.active{
display:block;
}

.close{
position:absolute;
top:30px;
right:35px;
font-size:30px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

header{
padding:20px 25px;
}

nav,
.search,
.contact{
display:none;
}

.hamburger{
display:block;
}

.logo{
font-size:26px;
}

}
.logo img{
height: 60px;;
width:auto;
object-fit:contain;

/* double shade effect */
filter:
drop-shadow(0 0 3px #7c3aed)
drop-shadow(0 0 6px #ff3e7f);

transition:0.3s;
}

/* hover glow */
.logo img:hover{
filter:
drop-shadow(0 0 6px #7c3aed)
drop-shadow(0 0 12px #ff3e7f);
}
/* remember + forgot */

.auth-options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
font-size:14px;
}

.remember{
color:#aaa;
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.remember input{
accent-color:#ff3e7f;
cursor:pointer;
}

.forgot{
color:#ff3e7f;
text-decoration:none;
font-size:14px;
}

.forgot:hover{
text-decoration:underline;
}
</style>
</head>
<body>

<header>

<div class="logo">
<img src="logo.webp" alt="Stackly Logo">
</div>

<nav id="navMenu">
<ul>

<li>
<a onclick="toggleDropdown(this)">
<i class="fa-solid fa-house"></i> HOME <i class="fa-solid fa-chevron-down"></i>
</a>

<div class="dropdown">
<a href="home.html">Home 1</a>
<a href="home2.html">Home 2</a>
</div>

</li>

<li>
<a href="movies.html"><i class="fa-solid fa-film"></i> MOVIES</a>
</li>
<li>
<a href="about.html"><i class="fa-solid fa-heart"></i> ABOUT US</a>
</li>
<li>
<a href="pages.html"><i class="fa-solid fa-file"></i> DASHBOARD </a>
</li>
<li>
<a href="contact.html"><i class="fa-solid fa-newspaper"></i> CONTACT US</a>
</li>

</ul>
</nav>

<div class="right">

<i class="fa-solid fa-magnifying-glass search"></i>

<a href="login.html" class="contact">
<i class="fa-solid fa-crown"></i>
LOGIN NOW
</a>

<div class="hamburger" onclick="openMenu()">
<i class="fa-solid fa-bars"></i>
</div>

</div>

</header>

<!-- MOBILE MENU -->

<div class="mobile-menu" id="mobileMenu">

<div class="close" onclick="closeMenu()">
<i class="fa-solid fa-xmark"></i>
</div>

<ul>

<li>

<a onclick="toggleMobileDropdown()">
<i class="fa-solid fa-house"></i> HOME
</a>

<div class="mobile-dropdown" id="mobileDrop">
<a href="home.html">Home 1</a>
<a href="home2.html">Home 2</a>
</div>

</li>

<li><a href="movies.html"><i class="fa-solid fa-film"></i> MOVIES</a></li>
<li><a href="about.html"><i class="fa-solid fa-heart"></i> ABOUT US</a></li>
<li><a href="pages.html"><i class="fa-solid fa-file"></i> DASHBOARD</a></li>
<li><a href="contact.html"><i class="fa-solid fa-bag-shopping"></i> CONTACT US</a></li>
<li><a href="login.html"><i class="fa-solid fa-newspaper"></i> LOGIN</a></li>

</ul>

</div>

<script>

function toggleDropdown(element){

if(window.innerWidth <= 900){

let dropdown = element.nextElementSibling;
dropdown.classList.toggle("active");

}

}

function openMenu(){
document.getElementById("mobileMenu").classList.add("active");
}

function closeMenu(){
document.getElementById("mobileMenu").classList.remove("active");
}

function toggleMobileDropdown(){
document.getElementById("mobileDrop").classList.toggle("active");
}

</script>
<!-- AUTH SECTION -->

<section class="auth-section">

<div class="auth-container">

<div class="switch">
<button id="loginBtn" class="active">Login</button>
<button id="signupBtn">Signup</button>
</div>

<!-- LOGIN FORM -->

<form class="form active" id="loginForm">

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required minlength="4">
<label>Password</label>
</div>

<div class="auth-options">

<label class="remember">
<input type="checkbox">
Remember me
</label>

<a href="404.html" class="forgot">Forgot password?</a>

</div>

<button class="auth-btn" type="submit">Login</button>

</form>


<!-- SIGNUP FORM -->

<form class="form" id="signupForm">

<div class="input-box">
<input type="text" required>
<label>Full Name</label>
</div>

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required minlength="4">
<label>Password</label>
</div>

<div class="input-box">
<input type="password" required minlength="4">
<label>Confirm Password</label>
</div>

<button class="auth-btn" type="submit">Create Account</button>

<p class="extra">
Already have an account?
<a href="login.html" id="goLogin">Login</a>
</p>

</form>

</div>

</section>


<style>

/* AUTH SECTION */

.auth-section{
min-height:calc(100vh - 120px);
display:flex;
align-items:center;
justify-content:flex-end;
padding:80px 120px;
position:relative;
overflow:hidden;
background:#0d0d0d;
}

/* glow background */

.auth-section::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(45deg,#7c3aed,#ff3e7f);
filter:blur(160px);
top:-150px;
left:-150px;
opacity:.5;
}
.auth-section{
min-height:calc(100vh - 120px);
display:flex;
align-items:center;
justify-content:center;   /* CENTER FIX */
padding:80px 20px;
position:relative;
overflow:hidden;
background:#0d0d0d;
}
.auth-section::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:linear-gradient(45deg,#ff3e7f,#7c3aed);
filter:blur(160px);
bottom:-150px;
right:-150px;
opacity:.5;
}

/* LOGIN CARD */

.auth-container{
width:420px;
background:rgba(20,20,20,0.8);
padding:40px;
border-radius:18px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 70px rgba(0,0,0,0.6);
z-index:2;
}

/* SWITCH */

.switch{
display:flex;
background:#111;
border-radius:30px;
overflow:hidden;
margin-bottom:30px;
}

.switch button{
flex:1;
padding:12px;
border:none;
background:none;
color:#aaa;
cursor:pointer;
font-size:15px;
}

.switch button.active{
background:linear-gradient(90deg,#7c3aed,#ff3e7f);
color:white;
}

/* FORMS */

.form{
display:none;
}

.form.active{
display:block;
}

/* INPUT */

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:14px;
background:#111;
border:1px solid #333;
border-radius:8px;
color:white;
outline:none;
}

.input-box label{
position:absolute;
top:14px;
left:14px;
color:#777;
font-size:14px;
pointer-events:none;
transition:.3s;
}

.input-box input:focus + label,
.input-box input:valid + label{
top:-8px;
left:10px;
font-size:12px;
background:#0d0d0d;
padding:0 6px;
color:#ff3e7f;
}

/* BUTTON */

.auth-btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7c3aed,#ff3e7f);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.auth-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 30px rgba(255,0,150,0.4);
}

/* TEXT */

.extra{
text-align:center;
margin-top:15px;
color:#aaa;
}

.extra a{
color:#ff3e7f;
text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.auth-section{
justify-content:center;
padding:40px 20px;
}

.auth-container{
width:100%;
max-width:400px;
}

}

</style>


<script>

/* LOGIN / SIGNUP SWITCH */

const loginBtn=document.getElementById("loginBtn");
const signupBtn=document.getElementById("signupBtn");

const loginForm=document.getElementById("loginForm");
const signupForm=document.getElementById("signupForm");

loginBtn.onclick=()=>{
loginForm.classList.add("active");
signupForm.classList.remove("active");

loginBtn.classList.add("active");
signupBtn.classList.remove("active");
}

signupBtn.onclick=()=>{
signupForm.classList.add("active");
loginForm.classList.remove("active");

signupBtn.classList.add("active");
loginBtn.classList.remove("active");
}

document.getElementById("goLogin").onclick=(e)=>{
e.preventDefault();
loginBtn.click();
}

/* REDIRECT TO 404 AFTER VALIDATION */

loginForm.addEventListener("submit",function(e){

if(loginForm.checkValidity()){
window.location.href="404.html";
}

});

signupForm.addEventListener("submit",function(e){

if(signupForm.checkValidity()){
window.location.href="404.html";
}

});

</script>
